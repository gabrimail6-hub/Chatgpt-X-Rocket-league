name: Build TakeoffCoach

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: bakkesmodorg/BakkesModSDK
          path: BakkesModSDK

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile
        shell: cmd
        run: |
          if not exist build mkdir build
          cl /nologo /std:c++20 /EHsc /LD /MD /W4 /WX ^
            /external:I"BakkesModSDK\include" ^
            /external:W0 ^
            /I"." ^
            TakeoffCoach.cpp ^
            imgui.cpp ^
            imgui_draw.cpp ^
            imgui_widgets.cpp ^
            /link ^
            /LIBPATH:"BakkesModSDK\lib" ^
            pluginsdk.lib ^
            /OUT:"build\TakeoffCoach.dll"

      - name: Copy runtime files
        shell: cmd
        run: |
          copy /Y takeoffcoach.cfg build\takeoffcoach.cfg

      - uses: actions/upload-artifact@v4
        with:
          name: TakeoffCoach
          path: build

