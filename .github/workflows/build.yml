name: Build TakeoffCoach
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bakkesmodorg/BakkesModSDK
          path: BakkesModSDK
      - uses: actions/checkout@v4
        with:
          repository: Martinii89/BakkesmodPluginTemplate
          path: Template
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile DLL
        shell: cmd
        run: |
          if not exist build mkdir build
          cl /nologo /std:c++20 /EHsc /LD /MD ^
            /I"BakkesModSDK\include" ^
            /I"Template" ^
            /I"Template\IMGUI" ^
            TakeoffCoach.cpp ^
            Template\IMGUI\imgui.cpp ^
            Template\IMGUI\imgui_draw.cpp ^
            Template\IMGUI\imgui_widgets.cpp ^
            /link ^
            /LIBPATH:"BakkesModSDK\lib" ^
            pluginsdk.lib ^
            /OUT:"build\TakeoffCoach.dll"
      - name: Copy config
        shell: cmd
        run: copy /Y takeoffcoach.cfg build\takeoffcoach.cfg
      - uses: actions/upload-artifact@v4
        with:
          name: TakeoffCoach
          path: build
